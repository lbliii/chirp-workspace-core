name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run playwright install --with-deps chromium
      - run: uv run ruff check .
      - run: uv run ruff format . --check
      - run: uv run ty check src/ conformance/
      - name: Check conformance deploy contract
        env:
          DATABASE_URL: "sqlite:///:memory:"
          WORKSPACE_SETUP_TOKEN: "ci-only-workspace-setup-token-00000000"
          CHIRP_SECRET_KEY: "ci-only-workspace-secret-key-0000000000000000"
          CHIRP_ENV: "production"
          RAILWAY_PUBLIC_DOMAIN: "workspace-core-conformance.invalid"
          PORT: "8000"
          PYTHONPATH: "."
        run: uv run chirp check conformance.app:app --deploy
      - run: uv run pytest --cov=chirp_workspace_core --cov-report=term-missing --cov-fail-under=80 -q
      - run: uv build
