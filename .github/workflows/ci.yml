name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format . --check
      - run: uv run ty check src/
      - run: uv run pytest --cov=chirp_workspace_core --cov-report=term-missing --cov-fail-under=80 -q
      - run: uv build
